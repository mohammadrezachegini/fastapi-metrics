apiVersion: v1
kind: Namespace
metadata:
  name: fastapi-metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-metrics
  namespace: fastapi-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-metrics
  template:
    metadata:
      labels:
        app: fastapi-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        workload: apps
      containers:
      - name: fastapi-metrics
        image: 10.0.0.206:5000/fastapi-metrics:latest
        ports:
        - containerPort: 8001
        env:
        - name: APP_VERSION
          value: "v1"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-metrics
  namespace: fastapi-metrics
spec:
  selector:
    app: fastapi-metrics
  ports:
  - port: 8001
    targetPort: 8001

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-metrics-ingress
  namespace: fastapi-metrics
spec:
  ingressClassName: nginx
  rules:
  - host: fastapi-metrics.rezaops.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-metrics
            port:
              number: 8001

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-metrics-hpa
  namespace: fastapi-metrics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-metrics
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50